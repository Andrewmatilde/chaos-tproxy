openapi: 3.0.3
info:
  title: chaos-tproxy config
  version: 0.5.3
  description: |
    Schema for the YAML/JSON configuration consumed by the
    chaos-tproxy proxy binary. This is the wire contract between any
    controller (Rust today, Go in the future) and the proxy.

    Scope: this document only describes fields that the **proxy**
    actually reads. Loader / topology fields (container, iface_wan,
    iface_lo, proxy_ports as an array, …) are out of scope for this
    file and live in a separate schema.

# chaos-tproxy is a transparent L7 proxy — no HTTP control API at the
# moment. `paths` exists empty so the document is a valid OpenAPI 3.0
# spec; codegen tools generate types from `components.schemas`.
paths: {}

components:
  schemas:

    ChaosTproxyConfig:
      type: object
      description: Top-level config the proxy reads at startup.
      required: [listen_port]
      properties:
        listen_port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
          description: |
            TCP port the proxy listens on (with `IP_TRANSPARENT`).
            BPF / iptables datapath redirects original-dst traffic to
            this port.
        rules:
          type: array
          description: Chaos rules, evaluated in declaration order.
          items:
            $ref: '#/components/schemas/Rule'
          default: []
        role:
          allOf:
            - $ref: '#/components/schemas/Role'
          nullable: true
          description: |
            If set, rules only fire when the connection's
            (src_ip, dst_ip) matches the configured side.
        proxy_mark:
          type: integer
          format: int64
          minimum: 0
          maximum: 4294967295
          nullable: true
          description: |
            `SO_MARK` set on upstream sockets opened by the proxy.
            Used by the eBPF egress program to skip the proxy's own
            forward traffic and avoid redirect loops.

    # ---------------------------------------------------------------
    # Role: which side of a connection rules apply to
    # ---------------------------------------------------------------
    # Wire format (serde default for an enum with one tuple field per
    # variant — "externally tagged"):
    #   { "Client": ["10.0.0.1", "10.0.0.2"] }
    #   { "Server": ["10.0.0.42"] }
    Role:
      oneOf:
        - $ref: '#/components/schemas/RoleClient'
        - $ref: '#/components/schemas/RoleServer'

    RoleClient:
      type: object
      required: [Client]
      additionalProperties: false
      properties:
        Client:
          type: array
          items:
            type: string
            format: ipv4
          description: Rule fires when the connection's source ip is in this list.

    RoleServer:
      type: object
      required: [Server]
      additionalProperties: false
      properties:
        Server:
          type: array
          items:
            type: string
            format: ipv4
          description: Rule fires when the connection's destination ip is in this list.

    # ---------------------------------------------------------------
    # Rule
    # ---------------------------------------------------------------
    Rule:
      type: object
      required: [target, selector, actions]
      properties:
        target:
          $ref: '#/components/schemas/Target'
        selector:
          $ref: '#/components/schemas/Selector'
        actions:
          $ref: '#/components/schemas/Actions'

    Target:
      type: string
      enum: [Request, Response]
      description: Whether this rule matches against the HTTP request or the response.

    # ---------------------------------------------------------------
    # Selector — predicates against a request or response
    # All fields are AND-ed; absent fields mean "don't check".
    # ---------------------------------------------------------------
    Selector:
      type: object
      properties:
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
          nullable: true
          description: Match only when the original-dst port equals this.
        path:
          type: string
          nullable: true
          description: |
            Wildcard glob against the request URI path. Syntax is the
            `wildmatch` crate's flavor: `?` matches one char, `*`
            matches zero-or-more chars. Case-sensitive.
        method:
          type: string
          nullable: true
          description: HTTP method (GET / POST / …).
        code:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          nullable: true
          description: Match only when the response status equals this. Ignored on Request rules.
        request_headers:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Match only when every (name, value) pair appears in the request headers.
        response_headers:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Match only when every (name, value) pair appears in the response headers. Ignored on Request rules.

    # ---------------------------------------------------------------
    # Actions — what to do when a rule matches
    # Multiple actions can fire on one match; they apply in this order:
    # abort > delay > replace > patch.
    # ---------------------------------------------------------------
    Actions:
      type: object
      properties:
        abort:
          type: boolean
          nullable: true
          description: If true, terminate the request/response with a 502.
        delay:
          type: string
          nullable: true
          description: |
            Wait this long before continuing. Format is the `humantime`
            crate's flavor: `"100ms"`, `"3s"`, `"1m30s"`, etc.
        replace:
          allOf:
            - $ref: '#/components/schemas/ReplaceAction'
          nullable: true
        patch:
          allOf:
            - $ref: '#/components/schemas/PatchAction'
          nullable: true

    # ---------------------------------------------------------------
    # Replace — set fields wholesale
    # ---------------------------------------------------------------
    ReplaceAction:
      type: object
      properties:
        path:
          type: string
          nullable: true
          description: Replace request path. Ignored on Response rules.
        method:
          type: string
          nullable: true
          description: Replace request method. Ignored on Response rules.
        code:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          nullable: true
          description: Replace response status code. Ignored on Request rules.
        body:
          allOf:
            - $ref: '#/components/schemas/ReplaceBody'
          nullable: true
        queries:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Replace request query parameters with this map. Ignored on Response rules.
        headers:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Replace (set) request/response header values.

    ReplaceBody:
      type: object
      required: [contents]
      properties:
        contents:
          $ref: '#/components/schemas/ReplaceBodyContents'

    # Wire format (serde `#[serde(tag = "type", content = "value")]`):
    #   { "type": "TEXT",   "value": "<literal string>" }
    #   { "type": "BASE64", "value": "<base64-encoded bytes>" }
    ReplaceBodyContents:
      oneOf:
        - $ref: '#/components/schemas/ReplaceBodyContentsText'
        - $ref: '#/components/schemas/ReplaceBodyContentsBase64'
      discriminator:
        propertyName: type
        mapping:
          TEXT:   '#/components/schemas/ReplaceBodyContentsText'
          BASE64: '#/components/schemas/ReplaceBodyContentsBase64'

    ReplaceBodyContentsText:
      type: object
      required: [type, value]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [TEXT]
        value:
          type: string
          description: Literal replacement body.

    ReplaceBodyContentsBase64:
      type: object
      required: [type, value]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [BASE64]
        value:
          type: string
          description: Base64-encoded replacement body (decoded by the proxy at apply time).

    # ---------------------------------------------------------------
    # Patch — additive / merging modifications
    # ---------------------------------------------------------------
    PatchAction:
      type: object
      properties:
        body:
          allOf:
            - $ref: '#/components/schemas/PatchBody'
          nullable: true
        queries:
          type: array
          nullable: true
          description: |
            Query parameters to append. Each entry is a `[key, value]`
            pair; duplicate keys are intentionally allowed (e.g.
            `foo=1&foo=2`), which is why this is an array of pairs
            rather than a map.
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: string
        headers:
          type: array
          nullable: true
          description: |
            Headers to append. Each entry is a `[name, value]` pair;
            duplicate names are allowed for headers like Cookie.
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: string

    PatchBody:
      type: object
      required: [contents]
      properties:
        contents:
          $ref: '#/components/schemas/PatchBodyContents'

    # Wire format (serde `#[serde(tag = "type", content = "value")]`):
    #   { "type": "JSON", "value": "<json patch object as a string>" }
    PatchBodyContents:
      oneOf:
        - $ref: '#/components/schemas/PatchBodyContentsJson'
      discriminator:
        propertyName: type
        mapping:
          JSON: '#/components/schemas/PatchBodyContentsJson'

    PatchBodyContentsJson:
      type: object
      required: [type, value]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [JSON]
        value:
          type: string
          description: |
            JSON value (as a string). The proxy parses this and merges
            it into the request/response body using RFC 7396 JSON
            Merge Patch semantics.
